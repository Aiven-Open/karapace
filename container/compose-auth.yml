services:
  karapace-schema-registry-authn-only:
    # OIDC authentication only (no role-based authorization).
    # Used to isolate the sasl_oauthbearer_authentication_enabled flag in tests.
    profiles:
      - auth
    networks:
      - karapace
    image: ghcr.io/aiven-open/karapace:develop
    hostname: karapace-schema-registry-authn-only
    container_name: karapace-schema-registry-authn-only
    entrypoint:
      - python3
      - -m
      - karapace
    depends_on:
      - kafka
      - opentelemetry-collector
    ports:
      - 8281:8281
    volumes:
      - ./certs:/opt/karapace/certs
    environment:
      KARAPACE_KARAPACE_REGISTRY: true
      KARAPACE_ADVERTISED_HOSTNAME: karapace-schema-registry-authn-only
      KARAPACE_ADVERTISED_PROTOCOL: https
      KARAPACE_BOOTSTRAP_URI: kafka:29092
      KARAPACE_PORT: 8281
      KARAPACE_HOST: 0.0.0.0
      KARAPACE_CLIENT_ID: karapace-schema-registry-authn-only
      KARAPACE_GROUP_ID: karapace-schema-registry-authn-only
      KARAPACE_MASTER_ELECTION_STRATEGY: highest
      KARAPACE_MASTER_ELIGIBILITY: true
      KARAPACE_TOPIC_NAME: _schemas_authn_only
      KARAPACE_LOG_LEVEL: INFO
      KARAPACE_COMPATIBILITY: FULL
      KARAPACE_KAFKA_SCHEMA_READER_STRICT_MODE: false
      KARAPACE_KAFKA_RETRIABLE_ERRORS_SILENCED: true
      KARAPACE_TAGS__APP: karapace-schema-registry-authn-only
      KARAPACE_SERVER_TLS_CAFILE: /opt/karapace/certs/ca/rootCA.pem
      KARAPACE_SERVER_TLS_CERTFILE: /opt/karapace/certs/cert.pem
      KARAPACE_SERVER_TLS_KEYFILE: /opt/karapace/certs/key.pem
      KARAPACE_SASL_OAUTHBEARER_AUTHENTICATION_ENABLED: true
      KARAPACE_SASL_OAUTHBEARER_AUTHORIZATION_ENABLED: false
      KARAPACE_SASL_OAUTHBEARER_JWKS_ENDPOINT_URL: ${OIDC_JWKS_ENDPOINT_URL:-http://keycloak:8080/realms/karapace/protocol/openid-connect/certs}
      KARAPACE_SASL_OAUTHBEARER_ALLOW_INSECURE_JWKS: ${OIDC_ALLOW_INSECURE_JWKS:-true}
      KARAPACE_SASL_OAUTHBEARER_EXPECTED_ISSUER: ${OIDC_EXPECTED_ISSUER:-http://keycloak:8080/realms/karapace}
      KARAPACE_SASL_OAUTHBEARER_EXPECTED_AUDIENCE: ${OIDC_EXPECTED_AUDIENCE:-karapace-audience}
      KARAPACE_SASL_OAUTHBEARER_SUB_CLAIM_NAME: ${OIDC_SUB_CLAIM_NAME:-sub}
      KARAPACE_SASL_OAUTHBEARER_SKIP_AUTH_PATHS: '["/_health", "/metrics", "/master_available"]'

  karapace-rest-proxy-oidc:
    # REST Proxy with the forwarding gate ON, against the authn-only SR.
    profiles:
      - auth
    networks:
      - karapace
    image: ghcr.io/aiven-open/karapace:develop
    hostname: karapace-rest-proxy-oidc
    container_name: karapace-rest-proxy-oidc
    entrypoint:
      - python3
      - -m
      - karapace.kafka_rest_apis
    depends_on:
      - kafka
      - karapace-schema-registry-authn-only
    ports:
      - 8382:8382
    volumes:
      - ./certs:/opt/karapace/certs
    environment:
      KARAPACE_KARAPACE_REST: true
      KARAPACE_PORT: 8382
      KARAPACE_HOST: 0.0.0.0
      KARAPACE_ADVERTISED_HOSTNAME: karapace-rest-proxy-oidc
      KARAPACE_ADVERTISED_PROTOCOL: http
      KARAPACE_BOOTSTRAP_URI: kafka:29092
      KARAPACE_REGISTRY_SCHEME: https
      KARAPACE_REGISTRY_HOST: karapace-schema-registry-authn-only
      KARAPACE_REGISTRY_PORT: 8281
      KARAPACE_ADMIN_METADATA_MAX_AGE: 0
      KARAPACE_LOG_LEVEL: INFO
      KARAPACE_KAFKA_SCHEMA_READER_STRICT_MODE: false
      KARAPACE_KAFKA_RETRIABLE_ERRORS_SILENCED: true
      # Forwarding gate ON.
      KARAPACE_SASL_OAUTHBEARER_AUTHENTICATION_ENABLED: true

  karapace-rest-proxy-no-forward:
    # REST Proxy with the forwarding gate OFF — regression guard for flag-False deployments.
    profiles:
      - auth
    networks:
      - karapace
    image: ghcr.io/aiven-open/karapace:develop
    hostname: karapace-rest-proxy-no-forward
    container_name: karapace-rest-proxy-no-forward
    entrypoint:
      - python3
      - -m
      - karapace.kafka_rest_apis
    depends_on:
      - kafka
      - karapace-schema-registry-authn-only
    ports:
      - 8482:8482
    volumes:
      - ./certs:/opt/karapace/certs
    environment:
      KARAPACE_KARAPACE_REST: true
      KARAPACE_PORT: 8482
      KARAPACE_HOST: 0.0.0.0
      KARAPACE_ADVERTISED_HOSTNAME: karapace-rest-proxy-no-forward
      KARAPACE_ADVERTISED_PROTOCOL: http
      KARAPACE_BOOTSTRAP_URI: kafka:29092
      KARAPACE_REGISTRY_SCHEME: https
      KARAPACE_REGISTRY_HOST: karapace-schema-registry-authn-only
      KARAPACE_REGISTRY_PORT: 8281
      KARAPACE_ADMIN_METADATA_MAX_AGE: 0
      KARAPACE_LOG_LEVEL: INFO
      KARAPACE_KAFKA_SCHEMA_READER_STRICT_MODE: false
      KARAPACE_KAFKA_RETRIABLE_ERRORS_SILENCED: true
      # Forwarding gate OFF (default).

  karapace-schema-registry-basic:
    # Basic SR + Basic proxy + gate OFF — issue #1274 baseline.
    profiles:
      - auth
    networks:
      - karapace
    image: ghcr.io/aiven-open/karapace:develop
    hostname: karapace-schema-registry-basic
    container_name: karapace-schema-registry-basic
    entrypoint:
      - python3
      - -m
      - karapace
    depends_on:
      - kafka
    ports:
      - 8581:8581
    volumes:
      - ../tests/integration/config/karapace.auth.json:/opt/karapace/karapace.auth.json:ro
    environment:
      KARAPACE_KARAPACE_REGISTRY: true
      KARAPACE_ADVERTISED_HOSTNAME: karapace-schema-registry-basic
      KARAPACE_ADVERTISED_PROTOCOL: http
      KARAPACE_BOOTSTRAP_URI: kafka:29092
      KARAPACE_PORT: 8581
      KARAPACE_HOST: 0.0.0.0
      KARAPACE_CLIENT_ID: karapace-schema-registry-basic
      KARAPACE_GROUP_ID: karapace-schema-registry-basic
      KARAPACE_MASTER_ELECTION_STRATEGY: highest
      KARAPACE_MASTER_ELIGIBILITY: true
      KARAPACE_TOPIC_NAME: _schemas_basic
      KARAPACE_LOG_LEVEL: INFO
      KARAPACE_COMPATIBILITY: FULL
      KARAPACE_KAFKA_SCHEMA_READER_STRICT_MODE: false
      KARAPACE_KAFKA_RETRIABLE_ERRORS_SILENCED: true
      KARAPACE_REGISTRY_AUTHFILE: /opt/karapace/karapace.auth.json

  karapace-rest-proxy-basic:
    profiles:
      - auth
    networks:
      - karapace
    image: ghcr.io/aiven-open/karapace:develop
    hostname: karapace-rest-proxy-basic
    container_name: karapace-rest-proxy-basic
    entrypoint:
      - python3
      - -m
      - karapace.kafka_rest_apis
    depends_on:
      - kafka
      - karapace-schema-registry-basic
    ports:
      - 8682:8682
    environment:
      KARAPACE_KARAPACE_REST: true
      KARAPACE_PORT: 8682
      KARAPACE_HOST: 0.0.0.0
      KARAPACE_ADVERTISED_HOSTNAME: karapace-rest-proxy-basic
      KARAPACE_ADVERTISED_PROTOCOL: http
      KARAPACE_BOOTSTRAP_URI: kafka:29092
      KARAPACE_REGISTRY_SCHEME: http
      KARAPACE_REGISTRY_HOST: karapace-schema-registry-basic
      KARAPACE_REGISTRY_PORT: 8581
      KARAPACE_REGISTRY_USER: admin
      KARAPACE_REGISTRY_PASSWORD: admin
      KARAPACE_ADMIN_METADATA_MAX_AGE: 0
      KARAPACE_LOG_LEVEL: INFO
      KARAPACE_KAFKA_SCHEMA_READER_STRICT_MODE: false
      KARAPACE_KAFKA_RETRIABLE_ERRORS_SILENCED: true
      # Gate OFF: proxy keeps sending Basic to SR.

  keycloak:
    profiles:
      - auth
    networks:
      - karapace
    image: quay.io/keycloak/keycloak:24.0
    hostname: keycloak
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./oidc/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8383:8080"

  pingfederate:
    profiles:
      - pingfederate
    networks:
      - karapace
    image: pingidentity/pingfederate:edge
    hostname: pingfederate
    container_name: pingfederate
    environment:
      ORCHESTRATION_TYPE: compose
      PING_IDENTITY_ACCEPT_EULA: "YES"
      PING_IDENTITY_DEVOPS_USER: ${PING_IDENTITY_DEVOPS_USER:-}
      PING_IDENTITY_DEVOPS_KEY: ${PING_IDENTITY_DEVOPS_KEY:-}
      SERVER_PROFILE_URL: https://github.com/pingidentity/pingidentity-server-profiles.git
      SERVER_PROFILE_PATH: getting-started/pingfederate
      PING_IDENTITY_PASSWORD: 2FederateM0re
      CREATE_INITIAL_ADMIN_USER: "true"
      PF_ADMIN_PUBLIC_BASEURL: https://localhost:9999
      PF_ADMIN_PUBLIC_HOSTNAME: localhost
      PF_ENGINE_PUBLIC_HOSTNAME: localhost
    tmpfs:
      - /run/secrets
    ports:
      - "9031:9031"
      - "9999:9999"

networks:
  karapace:
    name: karapace_network
    driver: bridge
